# Template: /etc/apache2/sites-available/NAMASEKOLAH.lan.conf
# Konfigurasi VirtualHost Apache2
#
# Ganti placeholder:
#   NAMASEKOLAH → nama domain sekolah, contoh: lombokcyber
#   NAMAUSER    → username Linux pemilik direktori web, contoh: peserta1
#
# Setelah edit, aktifkan dengan:
#   a2ensite NAMASEKOLAH.lan.conf
#   apache2ctl configtest
#   systemctl reload apache2
#
# Pastikan permission direktori:
#   chmod 711 /home/NAMAUSER
#   chmod 755 /home/NAMAUSER/public_html
#   chmod 644 /home/NAMAUSER/public_html/index.html

<VirtualHost *:80>
    # Nama domain utama yang dilayani VirtualHost ini
    ServerName NAMASEKOLAH.lan

    # Alias tambahan: www.NAMASEKOLAH.lan juga diarahkan ke sini
    ServerAlias www.NAMASEKOLAH.lan

    # Direktori root tempat file web berada
    # Peserta mengupload index.html ke sini via SCP
    DocumentRoot /home/NAMAUSER/public_html

    # Email administrator (tampil di halaman error Apache)
    ServerAdmin webmaster@NAMASEKOLAH.lan

    # Konfigurasi izin akses ke DocumentRoot
    <Directory /home/NAMAUSER/public_html>
        # Options:
        #   Indexes        = tampilkan daftar file jika tidak ada index.html
        #   FollowSymLinks = izinkan symbolic link
        Options Indexes FollowSymLinks

        # AllowOverride: izinkan .htaccess mengubah konfigurasi
        AllowOverride All

        # Require all granted = izinkan akses dari semua IP
        Require all granted
    </Directory>

    # File log error khusus untuk VirtualHost ini
    ErrorLog ${APACHE_LOG_DIR}/NAMASEKOLAH.lan-error.log

    # File log akses khusus untuk VirtualHost ini
    CustomLog ${APACHE_LOG_DIR}/NAMASEKOLAH.lan-access.log combined
</VirtualHost>
