# Template: /etc/dhcp/dhcpd.conf
# File konfigurasi DHCP Server (isc-dhcp-server)
#
# Ganti placeholder:
#   NAMASEKOLAH    → nama domain sekolah, contoh: lombokcyber
#   IP_SERVER      → IP server (gateway client), contoh: 10.100.100.1
#   IP_NETWORK     → network address, contoh: 10.100.100.0
#   IP_RANGE_START → IP awal pool DHCP, contoh: 10.100.100.100
#   IP_RANGE_END   → IP akhir pool DHCP, contoh: 10.100.100.200
#   IP_BROADCAST   → broadcast address, contoh: 10.100.100.255
#
# SEBELUM EDIT: pastikan /etc/default/isc-dhcp-server berisi:
#   INTERFACESv4="ens19"

# Waktu sewa IP default dalam detik (43200 = 12 jam)
default-lease-time 43200;

# Waktu sewa IP maksimum dalam detik (86400 = 24 jam)
max-lease-time 86400;

# Deklarasi ini menyatakan server DHCP ini adalah otoritatif
# untuk subnet yang dikonfigurasi (wajib ada)
authoritative;

# Definisi subnet yang dilayani DHCP server ini
# Subnet ini harus sesuai dengan IP interface ens19
subnet IP_NETWORK netmask 255.255.255.0 {

    # Range IP yang akan dibagikan ke client
    # Sisakan beberapa IP di luar range untuk device statis
    range IP_RANGE_START IP_RANGE_END;

    # Gateway yang diberikan ke client
    # = IP server pada interface ens19
    option routers IP_SERVER;

    # Subnet mask yang diberikan ke client
    option subnet-mask 255.255.255.0;

    # DNS server yang diberikan ke client
    # = IP server sendiri (setelah bind9 dikonfigurasi)
    option domain-name-servers IP_SERVER;

    # Nama domain yang diberikan ke client
    option domain-name "NAMASEKOLAH.lan";

    # Broadcast address
    option broadcast-address IP_BROADCAST;
}

# Contoh: IP statis untuk client tertentu berdasarkan MAC address
# (opsional, tidak wajib dikonfigurasi)
# host client-desktop {
#     hardware ethernet AA:BB:CC:DD:EE:FF;  # MAC address client
#     fixed-address IP_RANGE_START;          # IP yang selalu diberikan
# }
