# Template: /etc/dovecot/conf.d/10-auth.conf
# Konfigurasi autentikasi Dovecot
#
# Dua baris yang perlu diubah dari default:
#
# 1. auth_allow_cleartext = yes
#    Izinkan autentikasi dengan password plaintext (tanpa enkripsi TLS).
#    Diperlukan di lingkungan lab tanpa sertifikat SSL.
#    Default Dovecot 2.4: tidak diizinkan (hanya boleh lewat TLS).
#    Catatan: di Dovecot ≤ 2.3 nama setting ini adalah disable_plaintext_auth = no
#
# 2. auth_mechanisms = plain login
#    Mekanisme autentikasi yang diizinkan:
#      plain  → autentikasi standar SASL (digunakan Thunderbird via IMAP)
#      login  → kompatibilitas dengan client email lama
#
# Cara edit:
#   nano /etc/dovecot/conf.d/10-auth.conf
#   Cari baris yang dikomentari dan hapus tanda # di depannya
#
# Setelah edit:
#   systemctl restart dovecot

# Izinkan koneksi plaintext (tanpa enkripsi) — untuk lingkungan lab
auth_allow_cleartext = yes

# Mekanisme autentikasi yang didukung
auth_mechanisms = plain login
