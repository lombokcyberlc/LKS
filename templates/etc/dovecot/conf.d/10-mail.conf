# Template: /etc/dovecot/conf.d/10-mail.conf
# Konfigurasi format dan lokasi mailbox Dovecot
#
# File ini menentukan di mana Dovecot menyimpan/membaca email user.
# Harus cocok dengan konfigurasi Postfix (home_mailbox = Maildir/).
#
# Dovecot 2.4 (Debian 13) menggunakan format baru:
#   mail_driver = maildir   → format penyimpanan
#   mail_path = ~/Maildir   → lokasi folder Maildir di home user
#
# Format lama (Dovecot ≤ 2.3) yang SUDAH TIDAK BERLAKU di Debian 13:
#   mail_location = maildir:~/Maildir    ← jangan gunakan ini
#
# Cara edit:
#   1. Buka file: nano /etc/dovecot/conf.d/10-mail.conf
#   2. Cari baris "mail_driver" dan ubah nilainya
#   3. Cari baris "mail_path" dan ubah nilainya
#
# Setelah edit:
#   systemctl restart dovecot
#   systemctl status dovecot

# Format penyimpanan email: maildir (satu file per pesan)
mail_driver = maildir

# Lokasi folder Maildir di home directory masing-masing user
# ~/Maildir → /home/USERNAME/Maildir/
mail_path = ~/Maildir
