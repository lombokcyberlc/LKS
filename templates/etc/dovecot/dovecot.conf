# Template: /etc/dovecot/dovecot.conf
# Konfigurasi utama Dovecot (IMAP/POP3 server)
#
# Dovecot adalah MDA (Mail Delivery Agent):
#   - Melayani client email (Thunderbird) via IMAP/POP3
#   - Membaca email dari Maildir yang ditulis Postfix
#
# Konfigurasi terdistribusi di /etc/dovecot/conf.d/
# File ini hanya mengaktifkan protokol; detail ada di conf.d/.
#
# File yang WAJIB diedit setelah ini:
#
#   /etc/dovecot/conf.d/10-mail.conf   → format & lokasi mailbox
#   /etc/dovecot/conf.d/10-auth.conf   → izinkan plaintext auth
#
# Setelah semua perubahan:
#   systemctl restart dovecot
#   systemctl status dovecot

# ============================================================
# PROTOKOL YANG AKTIF
# ============================================================

# Aktifkan IMAP dan POP3
# IMAP (port 143) : client sync email dengan server, email tetap di server
# POP3 (port 110) : client download email
protocols = imap pop3

# ============================================================
# RINGKASAN PERUBAHAN YANG DIPERLUKAN DI conf.d/
# ============================================================

# /etc/dovecot/conf.d/10-mail.conf
# --------------------------------
# Dovecot 2.4 (Debian 13) menggunakan format baru — WAJIB gunakan ini:
#
#   mail_driver = maildir
#   mail_path = ~/Maildir
#
# Format lama (mail_location = maildir:~/Maildir) sudah TIDAK dikenali.
# Harus cocok dengan: home_mailbox = Maildir/ di Postfix.

# /etc/dovecot/conf.d/10-auth.conf
# --------------------------------
# Ubah/aktifkan dua baris berikut:
#
#   auth_allow_cleartext = yes      ← izinkan password plaintext (lab)
#   auth_mechanisms = plain login   ← mekanisme autentikasi
#
# Di Dovecot ≤ 2.3 nama settingnya berbeda (disable_plaintext_auth = no).
