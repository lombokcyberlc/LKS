# Template: /etc/resolv.conf
# Konfigurasi DNS resolver — menentukan server DNS yang digunakan sistem
#
# Pada server LKS, DNS server adalah server itu sendiri (bind9).
# File ini harus diisi agar perintah seperti `dig`, `nslookup`,
# dan resolusi nama internal bekerja menggunakan DNS lokal.
#
# Ganti placeholder:
#   IP_SERVER → IP server pada interface LAN (ens19), contoh: 10.100.100.1
#
# PERHATIAN: File ini bisa ditimpa otomatis oleh dhcpcd (dari ens18 DHCP).
# Jika resolv.conf kembali ke DNS ISP setelah reboot, tambahkan baris
# berikut di /etc/dhcpcd.conf untuk mencegah penimpaan:
#   nohook resolv.conf
# Atau edit langsung setiap sesi ujian jika diperlukan.

nameserver IP_SERVER
